<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>爆走チャリレース - 道路ガチャ対応版</title>
<style>
    body { 
        margin: 0; background: #222; overflow: hidden; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        user-select: none; -webkit-user-select: none; touch-action: none; 
    }
    canvas { display: block; margin: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    
    #homeUI {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none; z-index: 10;
    }

    .green-btn {
        pointer-events: auto; position: absolute;
        background-color: #66ff33; color: #111;
        border: 2px solid #333; font-weight: bold;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer; box-shadow: 2px 4px 0px rgba(0,0,0,0.8);
        transition: transform 0.1s, box-shadow 0.1s;
        box-sizing: border-box; text-align: center; line-height: 1.2;
    }
    .green-btn:active { transform: translateY(4px); box-shadow: 0px 0px 0px rgba(0,0,0,0.8); }

    #nameBox { top: 3vh; left: 3vw; width: 30vw; max-width: 150px; height: 7vh; max-height: 50px; border-radius: 20px; font-size: clamp(0.8rem, 3.5vw, 1.2rem); transform: rotate(-3deg); }
    #coinBox { top: 3vh; right: 3vw; width: 35vw; max-width: 160px; height: 7vh; max-height: 50px; border-radius: 30px; font-size: clamp(0.8rem, 3.5vw, 1.2rem); }
    #gachaBtn { top: 15vh; right: 3vw; width: 20vmin; max-width: 90px; height: 20vmin; max-height: 90px; border-radius: 50%; font-size: clamp(0.7rem, 3.5vmin, 1.1rem); background-color: #ffd700; }
    #kisekaeBtn { top: calc(15vh + 22vmin); right: 3vw; width: 20vmin; max-width: 90px; height: 20vmin; max-height: 90px; border-radius: 50%; font-size: clamp(0.7rem, 3.5vmin, 1rem); background-color: #ff66b2; color: #fff;}
    #timeAttackBtn { bottom: 10vh; left: 8vw; width: 40vw; max-width: 180px; height: 10vh; max-height: 70px; border-radius: 40px; font-size: clamp(0.9rem, 4vw, 1.3rem); transform: rotate(-5deg); }
    #endlessBtn { bottom: 10vh; right: 8vw; width: 35vw; max-width: 160px; height: 10vh; max-height: 70px; border-radius: 40px; font-size: clamp(0.9rem, 4vw, 1.3rem); transform: rotate(3deg); }

    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        display: none; justify-content: center; align-items: center;
        z-index: 9999; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
        pointer-events: auto;
    }
    .modal-box {
        background: linear-gradient(135deg, #333 0%, #111 100%);
        padding: 6vw; border-radius: 20px; color: white; text-align: center;
        border: 4px solid #66ff33; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        max-width: 95vw; width: 420px; box-sizing: border-box; position: relative;
    }
    .modal-box h2 { margin-top: 0; font-size: clamp(1.3rem, 5vw, 1.8rem); text-shadow: 2px 2px 0 #000; border-bottom: 2px solid #555; padding-bottom: 10px;}
    .close-btn {
        padding: 10px 20px; font-size: 1rem; cursor: pointer; margin-top: 15px;
        background: #aaa; color: #111; border: none; border-radius: 10px; font-weight: bold;
        width: 100%;
    }

    .gacha-actions { display: flex; justify-content: space-around; gap: 10px; margin: 20px 0; }
    .gacha-action-btn {
        flex: 1; padding: 15px 5px; font-size: clamp(0.9rem, 4vw, 1.1rem); font-weight: bold;
        background: #ffd700; color: #111; border: 2px solid #daa520; border-radius: 15px;
        cursor: pointer; box-shadow: 0 4px 0 #c4a700; transition: transform 0.1s;
    }
    .gacha-action-btn:active { transform: translateY(4px); box-shadow: none; }
    
    .gacha-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-height: 45vh; overflow-y: auto; padding: 10px 0; }
    .gacha-item {
        width: 70px; height: 70px; border-radius: 10px; display: flex; flex-direction: column;
        justify-content: center; align-items: center; font-size: 0.65rem; font-weight: bold;
        text-shadow: 1px 1px 2px #000; border: 3px solid #fff; box-sizing: border-box; color: white;
        background-color: #444; background-position: center; background-size: cover;
    }
    .rarity-N { border-color: #aaa; }
    .rarity-R { border-color: #33ccff; }
    .rarity-SR { border-color: #ff33cc; box-shadow: 0 0 10px #ff33cc; }
    .rarity-UR { border-color: #ffd700; box-shadow: 0 0 15px #ffd700; }
    
    .kisekae-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 10px; }
    .tab-btn {
        flex: 1; padding: 8px 2px; font-weight: bold; border-radius: 8px 8px 0 0;
        background: #555; color: white; border: none; cursor: pointer; font-size: 0.8rem;
    }
    .tab-btn.active { background: #ff66b2; }
    .kisekae-item { cursor: pointer; transition: transform 0.1s; }
    .kisekae-item:active { transform: scale(0.9); }
    .kisekae-item.selected { outline: 4px solid #66ff33; outline-offset: 2px; }

    #kisekaeDesc {
        margin-bottom: 10px; padding: 8px; background: rgba(0,0,0,0.5);
        border-radius: 8px; font-size: 0.8rem; min-height: 2.5em;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        border: 1px solid #555;
    }

    #gameControls {
        position: fixed; bottom: 5vh; left: 0; width: 100vw;
        display: none; justify-content: space-between; align-items: flex-end;
        pointer-events: none; z-index: 50; padding: 0 5vw; box-sizing: border-box;
    }
    .control-group { display: flex; gap: 4vw; pointer-events: auto; }
    .v-btn {
        width: 16vw; height: 16vw; max-width: 70px; max-height: 70px;
        background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 50%; display: flex; justify-content: center; align-items: center;
        font-size: 1.5rem; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    .v-btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }
</style>
</head>
<body>

<div id="homeUI">
    <div id="nameBox" class="green-btn" onclick="alert('名前変更機能は準備中です！')">名前🖊️</div>
    <div id="coinBox" class="green-btn">💰 <span id="coinText">1000</span> yen</div>
    
    <div id="gachaBtn" class="green-btn" onclick="openGacha()">ガチャ</div>
    <div id="kisekaeBtn" class="green-btn" onclick="openKisekae('bg')">きせかえ</div>
    
    <div id="timeAttackBtn" class="green-btn" onclick="alert('タイムアタックモードは準備中です！')">タイムアタック</div>
    <div id="endlessBtn" class="green-btn">エンドレス</div>
</div>

<div id="resultOverlay" class="modal-overlay">
    <div class="modal-box" style="background: linear-gradient(135deg, #1e3c72, #2a5298); border-color: #ffeb3b;">
        <h2>ゲームオーバー</h2>
        <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <div id="resultScore">今回のスコア: <span style="color:#ffeb3b; font-size:1.5rem; font-weight:bold;">0</span></div>
            <div>ハイスコア: <span id="highScoreText" style="color:#ffeb3b; font-weight:bold;">0</span></div>
            <div style="margin-top:10px; font-size:0.9rem;">獲得コイン: <span id="resultCoins" style="color:#66ff33; font-size:1.2rem; font-weight:bold;">0</span> yen</div>
        </div>
        <button id="backToHomeBtn" class="gacha-action-btn" style="width:100%;">ホームに戻る</button>
    </div>
</div>

<div id="gachaOverlay" class="modal-overlay">
    <div class="modal-box">
        <h2>闇鍋ガチャ</h2>
        <p>所持コイン: <span id="gachaCoinDisplay" style="color:#66ff33; font-weight:bold; font-size:1.2rem;">0</span> yen</p>
        <p style="font-size:0.75rem; color:#ccc;">背景・キャラ・BGM・道路がランダムで出ます</p>
        <div class="gacha-actions">
            <button class="gacha-action-btn" onclick="rollGacha(1)">1回<br>100 yen</button>
            <button class="gacha-action-btn" onclick="rollGacha(11)">11連<br>1000 yen</button>
        </div>
        <button class="close-btn" onclick="document.getElementById('gachaOverlay').style.display='none'">閉じる</button>
    </div>
</div>

<div id="gachaResultOverlay" class="modal-overlay">
    <div class="modal-box">
        <h2>獲得アイテム</h2>
        <div id="gachaResultGrid" class="gacha-grid"></div>
        <button class="close-btn" onclick="document.getElementById('gachaResultOverlay').style.display='none'">もどる</button>
    </div>
</div>

<div id="kisekaeOverlay" class="modal-overlay">
    <div class="modal-box">
        <h2>きせかえ</h2>
        <div class="kisekae-tabs">
            <button class="tab-btn" id="tab_bg" onclick="openKisekae('bg')">背景</button>
            <button class="tab-btn" id="tab_road" onclick="openKisekae('road')">道路</button>
            <button class="tab-btn" id="tab_char" onclick="openKisekae('char')">キャラ</button>
            <button class="tab-btn" id="tab_bgm" onclick="openKisekae('bgm')">BGM</button>
        </div>
        <div id="kisekaeDesc">アイテムを選択してください</div>
        <div id="kisekaeGrid" class="gacha-grid"></div>
        <button class="close-btn" onclick="document.getElementById('kisekaeOverlay').style.display='none'">閉じる</button>
    </div>
</div>

<canvas id="game"></canvas>

<div id="gameControls">
    <div class="control-group">
        <div class="v-btn" id="btnLeft">◀</div>
        <div class="v-btn" id="btnRight">▶</div>
    </div>
    <div class="control-group">
        <div class="v-btn" id="btnBoost">🔥</div>
        <div class="v-btn" id="btnJump">⬆️</div>
    </div>
</div>

<audio id="bgmPlayer" loop></audio>

<script>
document.addEventListener('contextmenu', e => e.preventDefault(), { passive: false });

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const homeUI = document.getElementById("homeUI");
const resultOverlay = document.getElementById("resultOverlay");
const gameControls = document.getElementById("gameControls");

// --- データ定義 ---
const GACHA_ITEMS = [
    // --- 背景 ---
    { id: "bg_sky", type: "bg", name: "いつもの空", value: "#87ceeb", rarity: "N", weight: 40, desc: "爽やかな青空。風を切って走ろう！" },
    { id: "bg_sunset", type: "bg", name: "夕暮れ", value: "#ff7e5f", rarity: "N", weight: 30, desc: "エモい夕暮れ時。なんだかセンチメンタル。" },
    { id: "bg_night", type: "bg", name: "夜空", value: "#191970", rarity: "R", weight: 15, desc: "静かな夜空。星明かりだけが頼りだ。" },
    { id: "bg_blood", type: "bg", name: "ブラッド", value: "#8b0000", rarity: "SR", weight: 5, desc: "血塗られた世界… 危険な香りがする。" },
    { id: "bg_gold", type: "bg", name: "黄金郷", value:"ちいかわ.png", rarity: "UR", weight: 2, desc: "ちいかわの画像が表示される特別な背景！" },
    
    // --- 道路 ---
    { id: "road_default", type: "road", name: "アスファルト", value: "#333333", rarity: "N", weight: 40, desc: "走り慣れたいつもの道路。" },
    { id: "road_grass", type: "road", name: "草原", value: "#228b22", rarity: "R", weight: 20, desc: "オフロード気分で疾走しよう。" },
    { id: "road_lava", type: "road", name: "マグマ", value: "#ff4500", rarity: "SR", weight: 8, desc: "熱い！落ちたらひとたまりもないぞ。" },
    { id: "road_image", type: "road", name: "カスタム道", value: "road_skin.png", rarity: "UR", weight: 2, desc: "道路の見た目を画像に変更する豪華な床！" },

    // --- キャラ ---
    { id: "char_default", type: "char", name: "いつもの人", value: "主人公.png", rarity: "N", weight: 30, desc: "いつものチャリ乗り。安定感バツグン。" },
    { id: "char_ninja", type: "char", name: "忍者", value: "char_ninja.png", rarity: "R", weight: 15, desc: "俊敏な忍者。チャリの扱いはお手の物。" },
    { id: "char_robot", type: "char", name: "メカ", value: "char_robot.png", rarity: "SR", weight: 5, desc: "最新鋭のメカ。オイル交換は忘れずに。" },
    { id: "char_latias", type: "char", name: "ラティアス", value: "latias.png", value2: "latias_damaged.png", rarity: "UR", weight: 1, desc: "1回だけダメージを防ぐバリア付き特別仕様！" },

    // --- BGM ---
    { id: "bgm_default", type: "bgm", name: "いつもの曲", value: "bgm_default.mp3", rarity: "N", weight: 30, desc: "いつもの安心するBGM。" },
    { id: "bgm_rock", type: "bgm", name: "ロック", value: "bgm_rock.mp3", rarity: "R", weight: 15, desc: "激しいロック！テンションぶち上げで走れ！" }
];

let highScore = 0;
let coins = 1000;
let unlockedItems = ["bg_sky", "road_default", "char_default", "bgm_default"]; 
let currentBG = "bg_sky";
let currentRoad = "road_default";
let currentChar = "char_default";
let currentBGM = "bgm_default";

try {
    if(localStorage.getItem("chari_highscore") !== null) highScore = localStorage.getItem("chari_highscore");
    if(localStorage.getItem("chari_coins") !== null) coins = parseInt(localStorage.getItem("chari_coins"));
    if(localStorage.getItem("chari_unlocked_items") !== null) unlockedItems = JSON.parse(localStorage.getItem("chari_unlocked_items"));
    if(localStorage.getItem("chari_current_bg") !== null) currentBG = localStorage.getItem("chari_current_bg");
    if(localStorage.getItem("chari_current_road") !== null) currentRoad = localStorage.getItem("chari_current_road");
    if(localStorage.getItem("chari_current_char") !== null) currentChar = localStorage.getItem("chari_current_char");
    if(localStorage.getItem("chari_current_bgm") !== null) currentBGM = localStorage.getItem("chari_current_bgm");
} catch(e) {}

function saveGameData() {
    try {
        localStorage.setItem("chari_highscore", highScore);
        localStorage.setItem("chari_coins", coins);
        localStorage.setItem("chari_unlocked_items", JSON.stringify(unlockedItems));
        localStorage.setItem("chari_current_bg", currentBG);
        localStorage.setItem("chari_current_road", currentRoad);
        localStorage.setItem("chari_current_char", currentChar);
        localStorage.setItem("chari_current_bgm", currentBGM);
    } catch(e) {}
}

function updateCoinUI() {
    document.getElementById("coinText").innerText = coins;
    document.getElementById("gachaCoinDisplay").innerText = coins;
}

// --- 画像アセット ---
const bgImg = new Image();
const roadImg = new Image();
const playerImg = new Image();
const playerDamagedImg = new Image();
const enemyImg = new Image(); enemyImg.src = "主人公.png";
const gapImg = new Image(); gapImg.src = "隙間.png";

function applySkins() {
    let bgData = GACHA_ITEMS.find(item => item.id === currentBG);
    bgImg.src = (bgData && bgData.value.match(/\.(png|jpe?g|webp)$/i)) ? bgData.value : "";

    let roadData = GACHA_ITEMS.find(item => item.id === currentRoad);
    roadImg.src = (roadData && roadData.value.match(/\.(png|jpe?g|webp)$/i)) ? roadData.value : "";

    let charData = GACHA_ITEMS.find(item => item.id === currentChar);
    if(charData) {
        playerImg.src = charData.value;
        if(charData.value2) playerDamagedImg.src = charData.value2;
    }
}
applySkins();

const bgmPlayer = document.getElementById("bgmPlayer");
function playSelectedBGM() {
    let bgmData = GACHA_ITEMS.find(item => item.id === currentBGM);
    if(bgmData) { bgmPlayer.src = bgmData.value; bgmPlayer.play().catch(e => {}); }
}

// --- UI制御 ---
function openGacha() { updateCoinUI(); document.getElementById("gachaOverlay").style.display = "flex"; }
function rollGacha(times) {
    let cost = times === 11 ? 1000 : 100;
    if (coins < cost) { alert("コインが足りません！"); return; }
    coins -= cost; updateCoinUI();
    let results = [];
    let totalWeight = GACHA_ITEMS.reduce((sum, item) => sum + item.weight, 0);
    for(let i = 0; i < times; i++) {
        let r = Math.random() * totalWeight, cur = 0;
        for (let item of GACHA_ITEMS) {
            cur += item.weight;
            if (r <= cur) {
                results.push(item);
                if (!unlockedItems.includes(item.id)) unlockedItems.push(item.id);
                break;
            }
        }
    }
    saveGameData(); showGachaResult(results);
}

function showGachaResult(results) {
    const grid = document.getElementById("gachaResultGrid"); grid.innerHTML = "";
    results.forEach(item => {
        let div = document.createElement("div");
        div.className = `gacha-item rarity-${item.rarity}`;
        if((item.type === 'bg' || item.type === 'road') && item.value.match(/\.(png|jpe?g|webp)$/i)) {
            div.style.backgroundImage = `url('${item.value}')`;
        } else if(item.type === 'bg' || item.type === 'road') {
            div.style.backgroundColor = item.value;
        }
        let icon = item.type==='bg'?'🌄':(item.type==='road'?'🛣️':(item.type==='char'?'👤':'🎵'));
        div.innerHTML = `<span style="font-size:1.1rem;">${icon}</span><span>${item.name}</span>`;
        grid.appendChild(div);
    });
    document.getElementById("gachaOverlay").style.display = "none";
    document.getElementById("gachaResultOverlay").style.display = "flex";
}

function openKisekae(tab) {
    const tabs = ['bg', 'road', 'char', 'bgm'];
    tabs.forEach(t => document.getElementById(`tab_${t}`).className = "tab-btn " + (tab === t ? 'active' : ''));
    
    const grid = document.getElementById("kisekaeGrid");
    const descBox = document.getElementById("kisekaeDesc");
    grid.innerHTML = "";
    
    let activeId = (tab==='bg'?currentBG : (tab==='road'?currentRoad : (tab==='char'?currentChar : currentBGM)));
    let activeItem = GACHA_ITEMS.find(i => i.id === activeId);
    if(activeItem) descBox.innerHTML = `<span style="color:#ffeb3b; font-weight:bold;">${activeItem.name}</span><br>${activeItem.desc}`;

    GACHA_ITEMS.filter(item => item.type === tab).forEach(item => {
        let div = document.createElement("div");
        let isSelected = (activeId === item.id);
        let isUnlocked = unlockedItems.includes(item.id);
        div.className = `gacha-item ${isUnlocked ? 'kisekae-item' : ''} rarity-${item.rarity} ${isSelected ? 'selected' : ''}`;
        
        if(isUnlocked) {
            if((item.type==='bg'||item.type==='road') && item.value.match(/\.(png|jpe?g|webp)$/i)) div.style.backgroundImage = `url('${item.value}')`;
            else if(item.type==='bg'||item.type==='road') div.style.backgroundColor = item.value;
            let icon = item.type==='bg'?'🌄':(item.type==='road'?'🛣️':(item.type==='char'?'👤':'🎵'));
            div.innerHTML = `<span>${icon}</span><span>${item.name}</span>`;
            div.onclick = () => {
                if(tab==='bg') currentBG = item.id;
                if(tab==='road') currentRoad = item.id;
                if(tab==='char') currentChar = item.id;
                if(tab==='bgm') currentBGM = item.id;
                applySkins(); saveGameData(); openKisekae(tab);
            };
        } else {
            div.style.backgroundColor = "#222"; div.style.color = "#555"; div.innerHTML = "???";
        }
        grid.appendChild(div);
    });
    document.getElementById("kisekaeOverlay").style.display = "flex";
}

// --- ゲーム本体 ---
let audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSE(freq, time=0.1, type="square", vol=0.05){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.frequency.value = freq; osc.type = type;
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time);
    osc.start(); osc.stop(audioCtx.currentTime + time);
}

const CHAR_W = 60, CHAR_H = 120, ROAD_TOP_W = 70, ROAD_BTM_W = 220;
function resize(){
    let w = window.innerWidth, h = window.innerHeight;
    if(w/h > 9/16) w = h*9/16; else h = w*16/9;
    canvas.width = w; canvas.height = h;
}
window.addEventListener("resize", resize); 

let player, enemies, gaps, spawnedCoins, score, earnedCoins, baseSpeed, speed, gameRunning = false;
let dashTimer, boostCoolDown, roadOffset, spawnCooldown, combo, feverTimer, coinSpawnTimer, iframeTimer, latiasShield;
let keys = {};

const bindVirtualButton = (btnId, keyName) => {
    const btn = document.getElementById(btnId);
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyName] = true; }, {passive: false});
    btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyName] = false; }, {passive: false});
};
bindVirtualButton("btnLeft", "ArrowLeft"); bindVirtualButton("btnRight", "ArrowRight");
bindVirtualButton("btnJump", "Space"); bindVirtualButton("btnBoost", "ArrowUp");

function initHome() {
    resize(); gameRunning = false;
    homeUI.style.display = "block"; resultOverlay.style.display = "none"; gameControls.style.display = "none";
    updateCoinUI(); bgmPlayer.pause();
}

document.getElementById("endlessBtn").onclick = () => {
    initAudio(); playSelectedBGM();
    homeUI.style.display = "none"; gameControls.style.display = "flex";
    player = { x: canvas.width / 2, y: canvas.height - 180, vy: 0, onGround: true, jumpOverGap: false };
    enemies = []; gaps = []; spawnedCoins = [];
    score = 0; earnedCoins = 0; baseSpeed = 4.5; speed = 4.5; roadOffset = 0;
    dashTimer = 0; boostCoolDown = 0; spawnCooldown = 0; coinSpawnTimer = 0; combo = 0; feverTimer = 0; iframeTimer = 0;
    latiasShield = (currentChar === "char_latias");
    gameRunning = true;
};
document.getElementById("backToHomeBtn").onclick = () => initHome();

function getRoadHalfWidth(y) { return ROAD_TOP_W + (ROAD_BTM_W - ROAD_TOP_W) * Math.max(0, y / canvas.height); }
function getXPos(y, offset) { return (canvas.width / 2) + (offset * getRoadHalfWidth(y)); }

function update(){
    if(!gameRunning) return;
    baseSpeed += 0.001; speed = baseSpeed;
    if(dashTimer > 0) { speed = baseSpeed * 1.5; dashTimer--; }
    if(feverTimer > 0) { speed = baseSpeed * 2.0; feverTimer--; }
    if(boostCoolDown > 0) boostCoolDown--;
    if(iframeTimer > 0) iframeTimer--;

    if((keys["ArrowUp"] || keys["KeyW"]) && boostCoolDown <= 0) { dashTimer = 60; boostCoolDown = 300; playSE(800, 0.2, "sawtooth"); }
    if((keys["Space"] || keys["KeyK"]) && player.onGround){ player.vy = -10; player.onGround = false; player.jumpOverGap = false; playSE(600); }
    
    player.vy += 0.8; player.y += player.vy;
    if(player.y >= canvas.height - 180){
        if(!player.onGround && player.jumpOverGap) { combo++; score += 500; playSE(800+combo*20); if(combo>=10) feverTimer=240; }
        player.y = canvas.height - 180; player.vy = 0; player.onGround = true;
    }
    if(player.onGround) {
        if(keys["ArrowLeft"] || keys["KeyA"]) player.x -= 9;
        if(keys["ArrowRight"] || keys["KeyD"]) player.x += 9;
    }
    let curH = getRoadHalfWidth(player.y);
    player.x = Math.max(canvas.width/2 - curH, Math.min(canvas.width/2 + curH, player.x));

    roadOffset = (roadOffset + speed) % 100;

    // 障害物生成
    if(spawnCooldown <= 0) {
        let r = Math.random();
        if(r < 0.1) { gaps.push({y: -180}); spawnCooldown = 60; }
        else if(r < 0.25) { enemies.push({lane_offset: [-0.7,-0.35,0,0.35,0.7][Math.floor(Math.random()*5)], y: -CHAR_H, speed: baseSpeed*0.5}); spawnCooldown = 40; }
        else if(r < 0.3) { spawnedCoins.push({lane_offset: (Math.random()-0.5)*1.4, y: -50}); spawnCooldown = 20; }
    } else spawnCooldown--;

    enemies.forEach(e => {
        e.y += (speed - e.speed);
        let ex = getXPos(e.y, e.lane_offset), s = 0.5 + 0.5*(e.y/canvas.height);
        if(feverTimer<=0 && iframeTimer<=0 && player.onGround && Math.abs(player.x-ex)<CHAR_W*0.4*s && Math.abs(player.y-e.y)<CHAR_H*0.5*s) {
            if(latiasShield) { latiasShield=false; iframeTimer=60; e.y=9999; } else gameOver();
        }
    });
    gaps.forEach(g => { g.y += speed; if(!player.onGround && Math.abs(g.y+30-player.y)<80) player.jumpOverGap=true; });
    spawnedCoins.forEach((c,i) => {
        c.y += speed; let cx = getXPos(c.y, c.lane_offset);
        if(Math.abs(player.x-cx)<40 && Math.abs(player.y-c.y)<40) { earnedCoins+=5; playSE(1200); spawnedCoins.splice(i,1); }
    });

    score += speed * 0.1;
    enemies = enemies.filter(e => e.y < canvas.height + 100);
    gaps = gaps.filter(g => g.y < canvas.height + 100);
}

function gameOver() {
    gameRunning = false; if(score > highScore) highScore = score; coins += earnedCoins; saveGameData();
    setTimeout(() => {
        resultOverlay.style.display = "flex";
        document.getElementById("resultScore").innerHTML = `スコア: <span style="color:#ffeb3b">${Math.floor(score)}</span>`;
        document.getElementById("resultCoins").innerText = earnedCoins;
    }, 500);
}

function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 背景
    let bgData = GACHA_ITEMS.find(i => i.id === currentBG);
    if(feverTimer>0) ctx.fillStyle = `hsl(${Date.now()/5%360},60%,70%)`;
    else if(bgImg.src && bgImg.complete) ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    else ctx.fillStyle = (bgData && bgData.type==='bg')?bgData.value : "#87ceeb";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 道路
    let c = canvas.width/2;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(c-ROAD_BTM_W, canvas.height); ctx.lineTo(c-ROAD_TOP_W, 0); ctx.lineTo(c+ROAD_TOP_W, 0); ctx.lineTo(c+ROAD_BTM_W, canvas.height);
    ctx.clip();
    
    let roadData = GACHA_ITEMS.find(i => i.id === currentRoad);
    if(roadImg.src && roadImg.complete) {
        // 画像を道路に合わせて描画（簡易テクスチャ）
        for(let i=-1; i<canvas.height/100 + 1; i++) {
            ctx.drawImage(roadImg, c-ROAD_BTM_W, i*100 + roadOffset, ROAD_BTM_W*2, 100);
        }
    } else {
        ctx.fillStyle = (roadData && roadData.type==='road')?roadData.value : "#333";
        ctx.fill();
    }
    
    // 白線
    ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.setLineDash([30, 40]); ctx.lineDashOffset = -roadOffset;
    ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(c, 0); ctx.lineTo(c, canvas.height); ctx.stroke();
    ctx.restore(); ctx.setLineDash([]);

    // 隙間・コイン・敵
    gaps.forEach(g => { 
        let gw = getRoadHalfWidth(g.y)*2;
        if(gapImg.complete) ctx.drawImage(gapImg, c-gw/2, g.y, gw, 60);
        else { ctx.fillStyle="#000"; ctx.fillRect(c-gw/2, g.y, gw, 60); }
    });
    spawnedCoins.forEach(coin => {
        let cx = getXPos(coin.y, coin.lane_offset); ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(cx, coin.y, 15, 0, Math.PI*2); ctx.fill();
    });
    enemies.forEach(e => {
        let ex = getXPos(e.y, e.lane_offset), s = 0.5 + 0.5*(e.y/canvas.height);
        if(enemyImg.complete) ctx.drawImage(enemyImg, ex-CHAR_W*s/2, e.y-CHAR_H*s/2, CHAR_W*s, CHAR_H*s);
    });

    // 自機
    if(player) {
        ctx.save();
        if(iframeTimer>0 && Math.floor(Date.now()/100)%2===0) ctx.globalAlpha = 0.5;
        let pImg = (latiasShield||!playerDamagedImg.src)?playerImg : playerDamagedImg;
        let scale = (currentChar==='char_latias'?1.8:1) * (player.onGround?1:1.2);
        if(pImg.complete) ctx.drawImage(pImg, player.x-CHAR_W*scale/2, player.y-CHAR_H*scale/2, CHAR_W*scale, CHAR_H*scale);
        ctx.restore();
    }

    if(gameRunning) {
        ctx.fillStyle="white"; ctx.font="bold 20px sans-serif"; ctx.fillText("SCORE: "+Math.floor(score), 20, 40);
        ctx.fillStyle="#66ff33"; ctx.fillText("💰 "+earnedCoins, 20, 70);
    }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
initHome(); loop();

</script>
</body>
