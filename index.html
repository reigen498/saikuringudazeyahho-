<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>爆走チャリレース - スマホ風・コイン機能追加（スマホ操作最適化版）</title>
<style>
    /* スマホゲーム風の全画面固定・選択不可・スワイプスクロール禁止設定 */
    body { 
        margin: 0; background: #222; overflow: hidden; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        user-select: none; -webkit-user-select: none; 
        touch-action: none; /* スワイプやダブルタップズームを防止 */
    }
    canvas { display: block; margin: auto; background: #87ceeb; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    
    #homeUI {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none; z-index: 10;
    }

    .green-btn {
        pointer-events: auto; position: absolute;
        background-color: #66ff33; color: #111;
        border: 2px solid #333; font-weight: bold;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer; box-shadow: 2px 4px 0px rgba(0,0,0,0.8);
        transition: transform 0.1s, box-shadow 0.1s;
        box-sizing: border-box; text-align: center; line-height: 1.2;
    }
    .green-btn:active { transform: translateY(4px); box-shadow: 0px 0px 0px rgba(0,0,0,0.8); }

    #nameBox { top: 3vh; left: 3vw; width: 30vw; max-width: 150px; height: 7vh; max-height: 50px; border-radius: 20px; font-size: clamp(0.8rem, 3.5vw, 1.2rem); transform: rotate(-3deg); }
    #coinBox { top: 3vh; right: 3vw; width: 35vw; max-width: 160px; height: 7vh; max-height: 50px; border-radius: 30px; font-size: clamp(0.8rem, 3.5vw, 1.2rem); }
    #gachaBtn { top: 15vh; right: 3vw; width: 20vmin; max-width: 90px; height: 20vmin; max-height: 90px; border-radius: 50%; font-size: clamp(0.7rem, 3.5vmin, 1.1rem); }
    #kisekaeBtn { top: calc(15vh + 22vmin); right: 3vw; width: 20vmin; max-width: 90px; height: 20vmin; max-height: 90px; border-radius: 50%; font-size: clamp(0.7rem, 3.5vmin, 1rem); }
    #timeAttackBtn { bottom: 10vh; left: 8vw; width: 40vw; max-width: 180px; height: 10vh; max-height: 70px; border-radius: 40px; font-size: clamp(0.9rem, 4vw, 1.3rem); transform: rotate(-5deg); }
    #endlessBtn { bottom: 10vh; right: 8vw; width: 35vw; max-width: 160px; height: 10vh; max-height: 70px; border-radius: 40px; font-size: clamp(0.9rem, 4vw, 1.3rem); transform: rotate(3deg); }

    #resultOverlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        display: none; justify-content: center; align-items: center;
        z-index: 9999; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
    }
    #menuBox {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        padding: 8vw; border-radius: 20px; color: white; text-align: center;
        border: 4px solid #ffeb3b; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        max-width: 90vw; width: 400px; box-sizing: border-box;
    }
    #menuBox h1 { margin-top: 0; font-size: clamp(1.5rem, 6vw, 2rem); text-shadow: 2px 2px 0 #000; }
    .score-board { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: clamp(1rem, 4vw, 1.2rem); }
    .score-board span { color: #ffeb3b; font-weight: bold; font-size: clamp(1.2rem, 5vw, 1.5rem); }
    .home-back-btn {
        padding: 15px 30px; font-size: clamp(1rem, 4vw, 1.2rem); cursor: pointer;
        background: #ffeb3b; color: #333; border: none; border-radius: 50px;
        font-weight: bold; box-shadow: 0 6px 0 #c4a700; transition: all 0.1s;
    }
    .home-back-btn:active { transform: translateY(6px); box-shadow: none; }

    /* スマホ用バーチャルパッド（プレイ中のみ表示） */
    #gameControls {
        position: fixed; bottom: 5vh; left: 0; width: 100vw;
        display: none; justify-content: space-between; align-items: flex-end;
        pointer-events: none; z-index: 50; padding: 0 5vw; box-sizing: border-box;
    }
    .control-group { display: flex; gap: 4vw; pointer-events: auto; }
    .v-btn {
        width: 16vw; height: 16vw; max-width: 70px; max-height: 70px;
        background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 50%; display: flex; justify-content: center; align-items: center;
        font-size: 1.5rem; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: background 0.1s, transform 0.1s;
    }
    .v-btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }
</style>
</head>
<body>

<div id="homeUI">
    <div id="nameBox" class="green-btn" onclick="alert('名前変更機能は準備中です！')">名前🖊️</div>
    <div id="coinBox" class="green-btn">💰 <span id="coinText">100</span> yen</div>
    <div id="gachaBtn" class="green-btn" onclick="alert('ガチャ機能は準備中です！')">ガチャ</div>
    <div id="kisekaeBtn" class="green-btn" onclick="alert('きせかえ機能は準備中です！')">きせかえ</div>
    
    <div id="timeAttackBtn" class="green-btn" onclick="alert('タイムアタックモードは準備中です！')">タイムアタック</div>
    <div id="endlessBtn" class="green-btn">エンドレス</div>
</div>

<div id="resultOverlay">
    <div id="menuBox">
        <h1>ゲームオーバー</h1>
        <div class="score-board">
            <div id="resultScore">今回のスコア: <span>0</span></div>
            <div>ハイスコア: <span id="highScoreText">0</span></div>
            <div style="margin-top:10px; font-size:0.9rem;">獲得コイン: <span id="resultCoins" style="color:#66ff33; font-size:1.2rem;">0</span> yen</div>
        </div>
        <button id="backToHomeBtn" class="home-back-btn">ホームに戻る</button>
    </div>
</div>

<canvas id="game"></canvas>

<div id="gameControls">
    <div class="control-group">
        <div class="v-btn" id="btnLeft">◀</div>
        <div class="v-btn" id="btnRight">▶</div>
    </div>
    <div class="control-group">
        <div class="v-btn" id="btnBoost">🔥</div>
        <div class="v-btn" id="btnJump">⬆️</div>
    </div>
</div>

<script>
// 右クリックメニューや長押しメニューを禁止
document.addEventListener('contextmenu', e => e.preventDefault(), { passive: false });

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const homeUI = document.getElementById("homeUI");
const resultOverlay = document.getElementById("resultOverlay");
const resultScore = document.getElementById("resultScore");
const highScoreText = document.getElementById("highScoreText");
const resultCoinsText = document.getElementById("resultCoins");
const coinText = document.getElementById("coinText");

const endlessBtn = document.getElementById("endlessBtn");
const backToHomeBtn = document.getElementById("backToHomeBtn");
const gameControls = document.getElementById("gameControls"); // 仮想ボタンコンテナ

// データロード
let highScore = 0;
let coins = 100;
try {
    highScore = localStorage.getItem("chari_highscore") || 0;
    let savedCoins = localStorage.getItem("chari_coins");
    if(savedCoins !== null) { coins = parseInt(savedCoins); } 
    else { localStorage.setItem("chari_coins", coins); }
} catch(e) {}
highScoreText.innerHTML = Math.floor(highScore);
coinText.innerHTML = coins;

const PLAYER_IMG_SRC = "主人公.png";
const ENEMY_IMG_SRC  = "主人公.png";
const GAP_IMG_SRC    = "隙間.png"; 

const playerImg = new Image(); playerImg.src = PLAYER_IMG_SRC;
const enemyImg = new Image(); enemyImg.src = ENEMY_IMG_SRC;
const gapImg = new Image(); gapImg.src = GAP_IMG_SRC; 

const bgm = new Audio(); bgm.loop = true;
function playBGM(src) {
    try {
        if (bgm.src.includes(src)) return;
        bgm.pause(); bgm.src = src; bgm.currentTime = 0;
        bgm.play().catch(e => {});
    } catch(e) {}
}

let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSE(freq, time=0.1, type="square", vol=0.05){
    if(!audioCtx || audioCtx.state !== 'running') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq; osc.type = type;
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time);
    osc.start(); osc.stop(audioCtx.currentTime + time);
}

const CHAR_W = 60, CHAR_H = 120, ROAD_TOP_W = 70, ROAD_BTM_W = 220;

function resize(){
    let w = window.innerWidth, h = window.innerHeight;
    if(w/h > 9/16) w = h*9/16; else h = w*16/9;
    canvas.width = w; canvas.height = h;
    if(!gameRunning && player) { player.x = canvas.width / 2; player.y = canvas.height - 180; }
}
window.addEventListener("resize", resize); 

let player = null, enemies = [], gaps = [], spawnedCoins = [];
let score = 0, earnedCoins = 0;
let baseSpeed = 4.5, speed = 4.5, gameRunning = false;
let dashTimer = 0, boostCoolDown = 0, roadOffset = 0, spawnCooldown = 0;
let combo = 0, feverTimer = 0, coinSpawnTimer = 0;
let keys = {};

// PC用キーボード入力
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// スマホ用仮想ボタンの入力制御
const bindVirtualButton = (btnId, keyName) => {
    const btn = document.getElementById(btnId);
    // タッチデバイス用
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyName] = true; }, {passive: false});
    btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyName] = false; }, {passive: false});
    btn.addEventListener("touchcancel", (e) => { e.preventDefault(); keys[keyName] = false; }, {passive: false});
    // マウス操作（PC確認用）
    btn.addEventListener("mousedown", (e) => { e.preventDefault(); keys[keyName] = true; });
    btn.addEventListener("mouseup", (e) => { e.preventDefault(); keys[keyName] = false; });
    btn.addEventListener("mouseleave", (e) => { e.preventDefault(); keys[keyName] = false; });
};

bindVirtualButton("btnLeft", "ArrowLeft");
bindVirtualButton("btnRight", "ArrowRight");
bindVirtualButton("btnJump", "Space");
bindVirtualButton("btnBoost", "ArrowUp");

const LANE_OFFSETS = [-0.7, -0.35, 0, 0.35, 0.7];

function initHome() {
    resize();
    player = { x: canvas.width / 2, y: canvas.height - 180, vy: 0, onGround: true, jumpOverGap: false };
    gameRunning = false;
    homeUI.style.display = "block";
    resultOverlay.style.display = "none";
    gameControls.style.display = "none"; // ボタン非表示
    coinText.innerHTML = coins; 
}

endlessBtn.onclick = (e) => {
    e.stopPropagation(); initAudio();
    homeUI.style.display = "none";
    gameControls.style.display = "flex"; // プレイ中のみボタン表示
    
    player = { x: canvas.width / 2, y: canvas.height - 180, vy: 0, onGround: true, jumpOverGap: false };
    enemies = []; gaps = []; spawnedCoins = [];
    score = 0; earnedCoins = 0; baseSpeed = 4.5; speed = 4.5; 
    dashTimer = 0; boostCoolDown = 0; spawnCooldown = 0; coinSpawnTimer = 24;
    combo = 0; feverTimer = 0; roadOffset = 0;
    
    // 操作状態をリセット
    keys = {};
    gameRunning = true;
    playBGM("ひとりぼっちじゃない.mp3"); // BGM名変更可
};

backToHomeBtn.onclick = () => { initHome(); bgm.pause(); };

function getRoadHalfWidth(y) {
    let ratio = Math.max(0, y / canvas.height);
    return ROAD_TOP_W + (ROAD_BTM_W - ROAD_TOP_W) * ratio;
}
function getXPos(y, offset) { return (canvas.width / 2) + (offset * getRoadHalfWidth(y)); }

function spawnLogic() {
    if(!gameRunning || feverTimer > 0) return;
    if(spawnCooldown > 0) { spawnCooldown--; return; }

    if(Math.random() < 0.15) {
        const type = Math.random();
        let currentGapMultiplier = Math.max(2, 5 - (baseSpeed - 4.5) * 0.5);
        const SPAWN_GAP = CHAR_H * currentGapMultiplier; 

        if(type < 0.7) {
            let spawnCount = Math.random() < 0.8 ? 1 : 2; 
            let availableLanes = [...LANE_OFFSETS];
            for(let i=0; i<spawnCount; i++){
                let randIndex = Math.floor(Math.random() * availableLanes.length);
                let offset = availableLanes.splice(randIndex, 1)[0];
                enemies.push({ lane_offset: offset, y: -CHAR_H, speed: baseSpeed * 0.5, type: 'normal' });
            }
            let relativeSpeed = Math.max(speed - (baseSpeed * 0.5), 1);
            spawnCooldown = Math.floor(SPAWN_GAP / relativeSpeed); 
        } else if(type < 0.85) {
            let offset = LANE_OFFSETS[Math.floor(Math.random() * LANE_OFFSETS.length)];
            enemies.push({ lane_offset: offset, y: canvas.height + 200, speed: baseSpeed * 1.8, type: 'fast' });
            let relativeSpeed = Math.max((baseSpeed * 1.8) - speed, 1);
            spawnCooldown = Math.floor(SPAWN_GAP / relativeSpeed);
        } else {
            gaps.push({ y: -180 }); 
            let relativeSpeed = Math.max(speed, 1);
            spawnCooldown = Math.floor((SPAWN_GAP * 1.2) / relativeSpeed); 
        }
    }
}

function gameOver() {
    if(!gameRunning) return;
    gameRunning = false;
    gameControls.style.display = "none"; // ボタン非表示
    
    let finalScore = Math.floor(score);
    if(finalScore > highScore) {
        highScore = finalScore;
        try { localStorage.setItem("chari_highscore", highScore); } catch(e) {}
    }
    coins += earnedCoins;
    try { localStorage.setItem("chari_coins", coins); } catch(e) {}

    playBGM("ひとりえっちはもうしない.mp3"); // BGM名変更可
    setTimeout(() => { 
        resultOverlay.style.display = "flex"; 
        resultScore.innerHTML = `今回のスコア: <span>${finalScore}</span>`; 
        highScoreText.innerHTML = Math.floor(highScore);
        resultCoinsText.innerHTML = earnedCoins;
    }, 500);
}

function update(){
    if(!gameRunning || !player) return; 
    
    spawnLogic();
    baseSpeed += 0.001;
    let currentMoveSpeed = baseSpeed;

    if(coinSpawnTimer <= 0) {
        let coinProb = feverTimer > 0 ? 0.5 : 0.1;
        if(Math.random() < coinProb) {
            let offset = LANE_OFFSETS[Math.floor(Math.random() * LANE_OFFSETS.length)];
            spawnedCoins.push({ lane_offset: offset, y: -100 });
        }
        coinSpawnTimer = 24;
    } else { coinSpawnTimer--; }

    if((keys["ArrowUp"] || keys["KeyW"]) && boostCoolDown <= 0 && dashTimer <= 0){
        dashTimer = 60; boostCoolDown = 300; playSE(800, 0.2, "sawtooth", 0.1);
    }
    
    if(dashTimer > 0) { currentMoveSpeed = baseSpeed * 1.5; dashTimer--; }
    if(boostCoolDown > 0) boostCoolDown--;

    if(feverTimer > 0) {
        currentMoveSpeed = baseSpeed * 2.0; feverTimer--;
        if(feverTimer === 0) combo = 0; 
    }
    speed = currentMoveSpeed;

    if((keys["Space"] || keys["KeyK"]) && player.onGround){
        player.vy = -10; player.onGround = false; player.jumpOverGap = false;
        playSE(600, 0.1, "sine");
    }
    player.vy += 0.8; player.y += player.vy;

    if(player.y >= canvas.height - 180){
        if(!player.onGround){
            if(player.jumpOverGap) {
                dashTimer = 42; combo++; score += 500;
                playSE(800 + (combo * 20), 0.2, "triangle", 0.1);
                if(combo >= 10 && feverTimer <= 0) feverTimer = 240; 
            } else { combo = 0; }
        }
        player.y = canvas.height - 180; player.vy = 0; player.onGround = true;
    }

    if(player.onGround) {
        if(keys["ArrowLeft"] || keys["KeyA"]) player.x -= 9;
        if(keys["ArrowRight"] || keys["KeyD"]) player.x += 9;
    }
    
    let curRoadHalf = getRoadHalfWidth(player.y);
    player.x = Math.max(canvas.width/2 - curRoadHalf, Math.min(canvas.width/2 + curRoadHalf, player.x));
    roadOffset = (roadOffset + speed) % 100;
    
    enemies.forEach(e => {
        e.y += (speed - e.speed);
        let ex = getXPos(e.y, e.lane_offset);
        let s = 0.5 + (0.5 * Math.max(0, e.y / canvas.height));
        if(gameRunning && feverTimer <= 0 && player.onGround && 
           Math.abs(player.x - ex) < CHAR_W * 0.5 * s && Math.abs(player.y - e.y) < CHAR_H * 0.7 * s){
            gameOver();
        }
    });

    gaps.forEach(g => { 
        g.y += speed; 
        if(!player.onGround && Math.abs((g.y+30) - player.y) < 80) player.jumpOverGap = true; 
    });

    spawnedCoins.forEach((c, index) => {
        c.y += speed;
        let cx = getXPos(c.y, c.lane_offset);
        let s = 0.5 + (0.5 * Math.max(0, c.y / canvas.height));
        let coinHitbox = 20 * s;
        if(Math.abs(player.x - cx) < (CHAR_W * 0.5 * s + coinHitbox) && 
           Math.abs(player.y - c.y) < (CHAR_H * 0.7 * s + coinHitbox)){
            earnedCoins += 5; 
            playSE(1200, 0.1, "sine", 0.05); 
            spawnedCoins.splice(index, 1);
        }
    });

    score += speed * 0.1;
    enemies = enemies.filter(e => e.y < canvas.height + 400 && e.y > -400);
    gaps = gaps.filter(g => g.y < canvas.height + 200);
    spawnedCoins = spawnedCoins.filter(c => c.y < canvas.height + 100);
}

function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = feverTimer > 0 ? `hsl(${(Date.now()/5)%360}, 60%, 70%)` : "#87ceeb";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let c = canvas.width / 2;
    ctx.fillStyle = "#333";
    ctx.beginPath(); ctx.moveTo(c-ROAD_BTM_W, canvas.height); ctx.lineTo(c-ROAD_TOP_W, 0); ctx.lineTo(c+ROAD_TOP_W, 0); ctx.lineTo(c+ROAD_BTM_W, canvas.height); ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.setLineDash([30, 40]); 
    ctx.lineDashOffset = -roadOffset;
    ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(c, 0); ctx.lineTo(c, canvas.height); ctx.stroke(); ctx.setLineDash([]);

    if(!gameRunning && homeUI.style.display === "block") {
        ctx.fillStyle = "#0088ff"; let sqSize = 80; ctx.fillRect(c - sqSize/2, canvas.height - 80, sqSize, sqSize);
    }

    gaps.forEach(g => { 
        let gw = getRoadHalfWidth(g.y) * 2; let gh = 60; 
        if (gapImg.complete && gapImg.naturalWidth !== 0) ctx.drawImage(gapImg, canvas.width / 2 - gw / 2, g.y, gw, gh);
        else { ctx.fillStyle = "#000"; ctx.fillRect(canvas.width / 2 - gw / 2, g.y, gw, gh); }
    });

    spawnedCoins.forEach(coin => {
        let cx = getXPos(coin.y, coin.lane_offset);
        let s = 0.5 + (0.5 * Math.max(0, coin.y / canvas.height));
        let radius = 15 * s;
        ctx.fillStyle = "#ffd700"; 
        ctx.beginPath(); ctx.arc(cx, coin.y, radius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#daa520"; ctx.lineWidth = 3 * s; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, coin.y, radius * 0.6, 0, Math.PI * 2); ctx.stroke();
    });

    if(!player) return;

    enemies.forEach(e => {
        let x = getXPos(e.y, e.lane_offset);
        let s = 0.5 + (0.5 * Math.max(0, e.y / canvas.height));
        if(e.type === 'fast' && e.y > canvas.height){
            ctx.fillStyle = "red"; ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center"; ctx.fillText("!", x, canvas.height - 20); ctx.textAlign = "start";
        }
        if(e.type === 'fast') ctx.filter = "hue-rotate(90deg)";
        if (enemyImg.complete && enemyImg.naturalWidth !== 0) ctx.drawImage(enemyImg, x - (CHAR_W*s)/2, e.y - (CHAR_H*s)/2, CHAR_W*s, CHAR_H*s);
        ctx.filter = "none";
    });

    ctx.save();
    if(dashTimer > 0 || feverTimer > 0) ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
    let jumpScale = player.onGround ? 1 : 1.15;
    if(feverTimer > 0) ctx.filter = "saturate(5) brightness(1.2)";
    
    if (playerImg.complete && playerImg.naturalWidth !== 0) {
        ctx.drawImage(playerImg, player.x - (CHAR_W*jumpScale)/2, player.y - (CHAR_H*jumpScale)/2, CHAR_W*jumpScale, CHAR_H*jumpScale);
    } else {
        ctx.fillStyle = "#fff"; ctx.fillRect(player.x - (CHAR_W*jumpScale)/2, player.y - (CHAR_H*jumpScale)/2, CHAR_W*jumpScale, CHAR_H*jumpScale);
    }
    ctx.restore();

    if(gameRunning) {
        ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif";
        ctx.fillText("SCORE: " + Math.floor(score), 20, 45);
        ctx.fillStyle = "#ffeb3b"; ctx.fillText("COMBO: " + combo, 20, 80);
        ctx.fillStyle = "#66ff33"; ctx.fillText("💰 " + earnedCoins + " yen", 20, 115); 
        
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(20, canvas.height-40, 150, 20);
        if(boostCoolDown > 0) {
            ctx.fillStyle = "#555"; ctx.fillRect(20, canvas.height-40, (1 - boostCoolDown/300) * 150, 20);
            ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif"; ctx.fillText("RECHARGING...", 25, canvas.height-25);
        } else {
            ctx.fillStyle = "#ffeb3b"; ctx.fillRect(20, canvas.height-40, 150, 20);
            ctx.fillStyle = "#000"; ctx.font = "bold 12px sans-serif"; ctx.fillText("BOOST READY!", 25, canvas.height-25);
        }
    }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
initHome(); loop();

</script>
</body>
</html>
